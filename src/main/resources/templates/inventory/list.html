<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Inventory Management</title>
</head>
<body class="container">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary rounded-bottom mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Warehouse Portal</a>
        <div class="d-flex align-items-center">
            <span class="text-white me-3">User: <strong sec:authentication="name">User</strong></span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-light btn-sm">Log Out</button>
            </form>
        </div>
    </div>
</nav>

<h2 class="mb-4">Current Inventory</h2>

<table class="table table-bordered table-hover">
    <thead class="table-secondary">
        <tr>
            <th>SKU</th>
            <th>Name</th>
            <th>Quantity</th>
            <th>Location</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="p : ${products}">
            <td th:text="${p.sku}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.quantity}"></td>
            <td th:text="${p.location}"></td>
        </tr>
    </tbody>
</table>

<div sec:authorize="hasRole('MANAGER')" class="mt-5">
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">Add New Inventory Item</div>
        <div class="card-body">
            <form th:action="@{/insertProduct}" th:object="${product}" method="post" class="row g-3">
                <div class="col-md-3">
                    <input type="text" th:field="*{sku}" class="form-control" placeholder="SKU" required>
                </div>
                <div class="col-md-3">
                    <input type="text" th:field="*{name}" class="form-control" placeholder="Item Name" required>
                </div>
                <div class="col-md-2">
                    <input type="number" th:field="*{quantity}" class="form-control" placeholder="Qty" required>
                </div>
                <div class="col-md-2">
                    <input type="text" th:field="*{location}" class="form-control" placeholder="A-01" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-success w-100">Register</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
