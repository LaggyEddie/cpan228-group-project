<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Warehouse Login</title>
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container border-0" style="max-width: 400px;">
        <div class="card shadow-sm p-4 text-center">
            <h3 class="mb-4">System Access</h3>
            <form th:action="@{/login}" method="post">
                <div th:if="${param.error}" class="alert alert-danger py-2 small">Invalid credentials</div>
                <div th:if="${param.logout}" class="alert alert-success py-2 small">Successfully logged out</div>
                
                <input type="email" name="username" class="form-control mb-3" placeholder="Email (bobjoe@random.ca)" required>
                <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
                
                <button type="submit" class="btn btn-primary w-100">Log In</button>
            </form>
            <div class="mt-3">
                <a th:href="@{/}" class="text-muted small text-decoration-none">← Back to portal</a>
            </div>
        </div>
    </div>
</body>
</html>
