<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Inventory</title>

    <link th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Clothes Warehouse</a>

        <div>
            <a class="btn btn-light me-2" href="/">Home</a>
            <a class="btn btn-outline-light" href="/contact">Contact</a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="mb-4">Inventory Items</h2>

    <div class="table-container">
        <table class="table table-striped">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Brand</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Year</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="item : ${items}">
                    <td th:text="${item.id}"></td>
                    <td th:text="${item.name}"></td>
                    <td th:text="${item.brand}"></td>
                    <td th:text="${item.category}"></td>
                    <td>$<span th:text="${item.price}"></span></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="${item.year}"></td>
                </tr>
            </tbody>

        </table>
    </div>

</div>

</body>
</html>
